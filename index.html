<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Homework Archive</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="landing-page">

  <!-- Foglie animate -->
  <div class="floating-leaves">
    <div class="leaf leaf-1"></div>
    <div class="leaf leaf-2"></div>
    <div class="leaf leaf-3"></div>
    <div class="leaf leaf-4"></div>
    <div class="leaf leaf-5"></div>
    <div class="leaf leaf-6"></div>
    <div class="leaf leaf-7"></div>
    <div class="leaf leaf-8"></div>
    <div class="leaf leaf-9"></div>
    <div class="leaf leaf-10"></div>
  </div>

  <!-- Lucciole -->
  <div class="fireflies">
    <span class="firefly firefly-1"></span>
    <span class="firefly firefly-2"></span>
    <span class="firefly firefly-3"></span>
    <span class="firefly firefly-4"></span>
    <span class="firefly firefly-5"></span>
    <span class="firefly firefly-6"></span>
    <span class="firefly firefly-7"></span>
    <span class="firefly firefly-8"></span>
  </div>

  <!-- Luci morbide -->
  <div class="landing-glow landing-glow-1"></div>
  <div class="landing-glow landing-glow-2"></div>
  <div class="landing-glow landing-glow-3"></div>

  <!-- Silhouette decorative -->
  <div class="forest-silhouette forest-left"></div>
  <div class="forest-silhouette forest-right"></div>

  <div class="landing-container">
    <div class="landing-badge">Archivio accademico</div>

    <h1>Homework Archive</h1>

    <p>
      Uno spazio digitale dedicato alla raccolta degli homework del corso,
      costruito per mantenere continuità tra teoria, simulazione e sviluppo settimanale.
    </p>

    <div class="landing-meta">
      <span class="meta-line"></span>
      <span>Materiali organizzati per settimana</span>
      <span class="meta-line"></span>
    </div>

    <div class="loading-text">Preparazione dell’archivio in corso...</div>

    <a href="home.html" class="enter-btn">Accedi all’archivio</a>
  </div>

  <!-- Se vuoi accesso automatico dopo 3 secondi, togli i commenti
  <script>
    setTimeout(() => {
      window.location.href = "home.html";
    }, 3000);
  </script>
  -->

</body>
</html>
